name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install npm dependencies
        run: npm install

      - name: Install cargo-audit
        working-directory: src-tauri
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      # BLD-02: Use Tauri CLI for actual installers (.dmg, .msi, .AppImage)
      - name: Build Tauri installers
        env:
          # macOS code signing
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
          # Windows code signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ runner.os == 'Windows' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
        run: npx tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: warn
          retention-days: 14

      - name: Generate SBOM (CycloneDX)
        if: runner.os == 'Linux'
        working-directory: src-tauri
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --output-file ../sbom-rust.cdx.json
          cd ..
          npx @cyclonedx/cyclonedx-npm --output-file sbom-npm.cdx.json

      - name: Verify SBOM artifacts exist and are valid
        if: runner.os == 'Linux'
        run: |
          echo "Verifying SBOM files were generated..."
          test -f sbom-rust.cdx.json || { echo "FAIL: sbom-rust.cdx.json not found"; exit 1; }
          test -f sbom-npm.cdx.json || { echo "FAIL: sbom-npm.cdx.json not found"; exit 1; }
          python3 -c "import json; json.load(open('sbom-rust.cdx.json'))" || { echo "FAIL: sbom-rust.cdx.json is not valid JSON"; exit 1; }
          python3 -c "import json; json.load(open('sbom-npm.cdx.json'))" || { echo "FAIL: sbom-npm.cdx.json is not valid JSON"; exit 1; }
          python3 -c "import json; d=json.load(open('sbom-rust.cdx.json')); assert 'bomFormat' in d, 'Missing bomFormat'; assert d['bomFormat']=='CycloneDX', 'Not CycloneDX format'"
          python3 -c "import json; d=json.load(open('sbom-npm.cdx.json')); assert 'bomFormat' in d, 'Missing bomFormat'; assert d['bomFormat']=='CycloneDX', 'Not CycloneDX format'"
          echo "SBOM verification passed."

      - name: Upload SBOM artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-rust.cdx.json
            sbom-npm.cdx.json

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install npm dependencies
        run: npm install

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Generate test SSH keys
        run: |
          mkdir -p tests/fixtures/ssh-keys
          ssh-keygen -t ed25519 -f tests/fixtures/ssh-keys/test_ed25519 -N "" -C "crossterm-test" -q

      - name: Start test containers
        working-directory: tests
        run: docker compose up -d --wait

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for SSH on port 2222..."
          for i in $(seq 1 30); do nc -z 127.0.0.1 2222 && break || sleep 1; done
          echo "Waiting for SSH on port 2223..."
          for i in $(seq 1 30); do nc -z 127.0.0.1 2223 && break || sleep 1; done
          echo "All services ready."

      - name: Run integration tests
        working-directory: src-tauri
        run: cargo test --features integration -- --ignored --test-threads=1

      - name: Tear down containers
        if: always()
        working-directory: tests
        run: docker compose down --volumes --remove-orphans

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Tauri dev server
        run: npx tauri dev &
        env:
          DISPLAY: ':99'

      - name: Wait for dev server to be ready
        run: |
          echo "Waiting for Tauri dev server on port 1420..."
          for i in $(seq 1 60); do curl -s http://localhost:1420 > /dev/null && break || sleep 2; done
          echo "Dev server is ready."

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
