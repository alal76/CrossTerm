name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CrossTerm ${{ github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false

      - name: Generate checksums
        if: runner.os != 'Windows'
        run: |
          cd src-tauri/target/release/bundle
          find . -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.app.tar.gz" \) \
            -exec sh -c 'shasum -a 256 "$1" > "$1.sha256"' _ {} \;

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Include *.msi,*.exe |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
              "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256"
            }

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: src-tauri/target/release/bundle/**/*.sha256

  homebrew-publish:
    runs-on: macos-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS DMG checksum
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "CrossTerm_*_aarch64.dmg.sha256"
          out-file-path: artifacts/

      - name: Read SHA256
        id: sha
        run: |
          SHA=$(awk '{print $1}' artifacts/CrossTerm_*_aarch64.dmg.sha256)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" packaging/homebrew/crossterm.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.sha256 }}\"/" packaging/homebrew/crossterm.rb

      - name: Publish to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/alal76/homebrew-crossterm.git tap
          cp packaging/homebrew/crossterm.rb tap/Casks/crossterm.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/crossterm.rb
          git commit -m "Update CrossTerm to ${GITHUB_REF_NAME#v}"
          git push
