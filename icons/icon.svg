<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#bg)"/>
  <!-- Terminal prompt ">_" -->
  <text x="280" y="620" font-family="monospace, 'Courier New'" font-size="420" font-weight="bold" fill="#a78bfa">
    &gt;_
  </text>
  <!-- Subtle accent line at top (title bar) -->
  <rect x="64" y="64" width="896" height="8" rx="4" fill="#7c3aed" opacity="0.7"/>
</svg>
